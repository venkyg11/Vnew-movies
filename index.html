<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- TODO: Set the document title to the name of your application -->
  <title>Vnew movies</title>
  <meta name="description" content="Discover Telugu Cinema Like Never Before" />
  <meta name="author" content="Vnew movies" />
  <link rel="icon" type="image/png" href="/logo2.png" />

  <!-- Open Graph / Facebook -->
  <meta property="og:title" content="Vnew movies" />
  <meta property="og:description" content="Discover Telugu Cinema Like Never Before" />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="/logo2.png" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:site" content="@VnewMovies" />
  <meta name="twitter:image" content="/logo2.png" />
  
  <!-- PWA Meta Tags -->
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="theme-color" content="#8E2DE2" />
  <link rel="apple-touch-icon" href="/logo2.png" />
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => console.log('Service Worker registered', reg))
          .catch(err => console.error('Service Worker registration failed', err));
      });
    }
  </script>
</body>

</html>
